<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Scale - 学習記録・科目バランス</title>
<meta name="description" content="司法試験・予備試験の学習時間を科目ごとに記録し、バランスと過去問の進み具合を見える化。記録は端末の中だけ。Xにシェアもできます。" />
<meta name="theme-color" content="#1a1a1a" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Scale" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f9f9f9; --surface: #ffffff; --border: #e8e8e8; --border-light: #f2f2f2;
    --text: #1a1a1a; --text-2: #555; --text-3: #888; --text-4: #bbb; --text-5: #ddd;
    --accent: #1a1a1a; --accent-strong: #1a1a1a; --accent-soft: #f0f0f0;
    --shadow: 0 1px 2px rgba(0,0,0,0.03), 0 3px 10px rgba(0,0,0,0.04);
    --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, "Helvetica Neue", "Noto Sans JP", sans-serif; -webkit-font-smoothing: antialiased; line-height: 1.7; }
  body { min-height: 100vh; }
  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; }

  /* Nav */
  .nav { position: sticky; top: 0; z-index: 20; background: rgba(249,249,249,0.9); backdrop-filter: saturate(180%) blur(12px); -webkit-backdrop-filter: saturate(180%) blur(12px); border-bottom: 1px solid var(--border-light); padding-top: var(--safe-top); }
  .nav-bar { display: flex; align-items: center; justify-content: center; height: 50px; position: relative; }
  .nav-title { font-size: 17px; font-weight: 800; letter-spacing: 0.02em; }
  .nav-tabs { display: flex; max-width: 560px; margin: 0 auto; }
  .nav-tab { flex: 1; background: none; border: none; padding: 10px 4px 11px; font-size: 12.5px; font-weight: 600; color: var(--text-3); cursor: pointer; border-bottom: 2px solid transparent; }
  .nav-tab.active { color: var(--text); border-bottom-color: var(--accent-strong); font-weight: 800; }

  .main { max-width: 560px; margin: 0 auto; padding: 18px 16px calc(40px + var(--safe-bottom)); }
  .section-title { font-size: 19px; font-weight: 800; letter-spacing: -0.01em; }
  .muted { color: var(--text-3); font-size: 13px; }

  /* Cards / buttons */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .btn-primary { background: var(--accent-strong); color: #fff; border: none; border-radius: 12px; padding: 13px 16px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; transition: opacity 0.15s, transform 0.1s; }
  .btn-primary:active { transform: translateY(1px); opacity: 0.92; }
  .btn-primary:disabled { opacity: 0.4; cursor: default; }
  .btn-secondary { background: var(--accent-soft); color: var(--accent-strong); border: none; border-radius: 12px; padding: 12px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-secondary:active { background: var(--border); }
  .btn-ghost { background: none; border: 1.5px solid var(--border); border-radius: 999px; padding: 7px 14px; font-size: 12px; color: var(--text-3); cursor: pointer; }
  .btn-danger { background: none; border: 1.5px solid #e3b7b0; color: #b5503f; border-radius: 12px; padding: 11px 16px; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }

  /* Home summary */
  .summary { display: flex; gap: 10px; margin-bottom: 14px; }
  .sum-box { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 13px 14px; box-shadow: var(--shadow); }
  .sum-label { font-size: 11.5px; color: var(--text-3); }
  .sum-val { font-size: 21px; font-weight: 800; margin-top: 2px; letter-spacing: -0.01em; }
  .sum-val small { font-size: 12px; font-weight: 600; color: var(--text-3); }

  /* Balance bars */
  .bal-row { display: flex; align-items: center; gap: 10px; margin-bottom: 11px; }
  .bal-name { width: 76px; font-size: 12.5px; font-weight: 600; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bal-track { flex: 1; height: 10px; background: var(--border-light); border-radius: 6px; overflow: hidden; }
  .bal-fill { height: 100%; border-radius: 6px; transition: width 0.4s; min-width: 2px; }
  .bal-val { width: 62px; text-align: right; font-size: 11.5px; color: var(--text-3); flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .bal-val .met { color: #4a9a7a; font-weight: 700; }

  /* Timer */
  .timer-card { background: linear-gradient(135deg, #2a2a2e, #1a1a1a); color: #fff; border-radius: 16px; padding: 16px 18px; margin-bottom: 12px; }
  .timer-top { display: flex; align-items: center; justify-content: space-between; }
  .timer-label { font-size: 12px; color: rgba(255,255,255,0.7); }
  .timer-time { font-size: 30px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: 0.01em; margin-top: 2px; }
  .timer-subj { font-size: 13px; color: rgba(255,255,255,0.85); margin-top: 2px; }
  .timer-btns { display: flex; gap: 8px; margin-top: 12px; }
  .timer-btns button { flex: 1; border-radius: 10px; padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; }
  .tb-stop { background: #fff; color: #1a1a1a; }
  .tb-cancel { background: rgba(255,255,255,0.14); color: #fff; }
  .tb-start { background: #fff; color: #1a1a1a; }

  /* Chips */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { border: 1.5px solid var(--border); background: var(--surface); border-radius: 999px; padding: 8px 14px; font-size: 13px; color: var(--text-2); cursor: pointer; display: inline-flex; align-items: center; gap: 7px; }
  .chip.active { border-color: var(--accent-strong); background: #fff; color: var(--text); font-weight: 700; }
  .chip .cdot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }

  .field-label { font-size: 12.5px; font-weight: 700; color: var(--text-2); margin-bottom: 8px; }
  input[type=text], input[type=number], textarea, select { width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; font-size: 14px; color: var(--text); background: var(--surface); }
  textarea { resize: vertical; min-height: 64px; line-height: 1.6; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--text-4); }

  /* Stepper */
  .stepper { display: flex; align-items: center; justify-content: center; gap: 16px; }
  .step-btn { width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--surface); font-size: 22px; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
  .step-btn:active { background: var(--accent-soft); }
  .step-val { font-size: 22px; font-weight: 800; min-width: 110px; text-align: center; }
  .step-val small { font-size: 13px; font-weight: 600; color: var(--text-3); }
  .presets { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-top: 12px; }
  .preset { border: 1px solid var(--border); background: var(--surface); border-radius: 999px; padding: 6px 12px; font-size: 12px; color: var(--text-2); cursor: pointer; }
  .preset:active { background: var(--accent-soft); }

  /* History */
  .day-head { font-size: 12px; font-weight: 700; color: var(--text-3); margin: 18px 2px 8px; display: flex; justify-content: space-between; }
  .log-item { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; margin-bottom: 8px; box-shadow: var(--shadow); cursor: pointer; }
  .log-bar { width: 4px; align-self: stretch; border-radius: 3px; flex-shrink: 0; }
  .log-body { flex: 1; min-width: 0; }
  .log-subj { font-size: 14px; font-weight: 700; }
  .log-meta { font-size: 12px; color: var(--text-3); margin-top: 1px; }
  .log-memo { font-size: 12.5px; color: var(--text-2); margin-top: 3px; word-break: break-word; }
  .log-min { font-size: 14px; font-weight: 800; color: var(--text); white-space: nowrap; }

  /* Subject mgmt */
  .subj-card { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 13px 15px; margin-bottom: 10px; box-shadow: var(--shadow); }
  .subj-color { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .subj-body { flex: 1; min-width: 0; }
  .subj-name { font-size: 15px; font-weight: 700; }
  .subj-stat { font-size: 12px; color: var(--text-3); margin-top: 2px; }
  .subj-actions { display: flex; gap: 6px; align-items: center; }
  .mini-btn { background: none; border: 1.5px solid var(--border); border-radius: 999px; padding: 5px 11px; font-size: 12px; color: var(--text-3); cursor: pointer; }
  .past-track { height: 6px; background: var(--border-light); border-radius: 4px; overflow: hidden; margin-top: 7px; }
  .past-fill { height: 100%; background: var(--accent-strong); border-radius: 4px; }

  .color-row { display: flex; flex-wrap: wrap; gap: 10px; }
  .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
  .color-dot.selected { border-color: var(--text); }

  /* Reading screens (terms/help) */
  .read-root { max-width: 560px; margin: 0 auto; padding: calc(28px + var(--safe-top)) 18px calc(40px + var(--safe-bottom)); }
  .read-head { text-align: center; margin-bottom: 18px; }
  .read-logo { font-size: 24px; font-weight: 800; }
  .read-tag { font-size: 12px; color: var(--text-3); margin-top: 4px; }
  .read-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 22px; box-shadow: var(--shadow); }
  .read-title { font-size: 18px; font-weight: 800; }
  .read-sub { font-size: 13px; color: var(--text-3); margin-top: 4px; margin-bottom: 6px; }
  .read-scroll { max-height: 58vh; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-right: 4px; }
  .read-h { font-size: 13px; font-weight: 800; margin-top: 18px; margin-bottom: 6px; }
  .read-p { font-size: 13.5px; color: var(--text-2); line-height: 1.85; }
  .read-list { font-size: 13.5px; color: var(--text-2); line-height: 1.85; padding-left: 20px; }
  .read-list li { margin-bottom: 6px; }
  .read-list strong, .read-p strong { color: var(--text); font-weight: 700; }
  .read-note { text-align: center; font-size: 11px; color: var(--text-4); margin-top: 16px; }

  /* Form screen */
  .form-root { max-width: 560px; margin: 0 auto; padding: calc(16px + var(--safe-top)) 16px calc(40px + var(--safe-bottom)); }
  .form-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .form-title { font-size: 18px; font-weight: 800; }
  .x-close { background: none; border: none; font-size: 15px; color: var(--text-3); cursor: pointer; padding: 6px 10px; }
  .form-block { margin-bottom: 20px; }

  /* Share preview */
  .share-pre { background: #fafafa; border: 1px solid var(--border); border-radius: 14px; padding: 14px; font-size: 13.5px; line-height: 1.8; white-space: pre-wrap; word-break: break-word; color: var(--text); }
  .seg { display: flex; background: var(--accent-soft); border-radius: 10px; padding: 3px; gap: 3px; margin-bottom: 14px; }
  .seg button { flex: 1; border: none; background: none; border-radius: 8px; padding: 8px; font-size: 13px; font-weight: 600; color: var(--text-3); cursor: pointer; }
  .seg button.active { background: #fff; color: var(--text); font-weight: 800; box-shadow: var(--shadow); }

  /* Settings */
  .settings-label { font-size: 13px; font-weight: 800; margin-bottom: 6px; }
  .settings-desc { font-size: 12.5px; color: var(--text-3); line-height: 1.7; margin-bottom: 12px; }
  .stat-row { display: flex; justify-content: space-between; padding: 7px 0; border-top: 1px solid var(--border-light); font-size: 13px; }
  .stat-row:first-of-type { border-top: none; }
  .stat-row-label { color: var(--text-3); }
  .stat-row-val { font-weight: 700; }
  .dev-msg { font-size: 13px; color: var(--text-2); line-height: 1.8; }
  .dev-links { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
  .dev-link { font-size: 13px; color: var(--accent-strong); text-decoration: none; border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px; }
  .donate-block { margin-top: 12px; }
  .donate-label { font-size: 12.5px; font-weight: 700; margin-bottom: 6px; }
  .eth-box { background: #fafafa; border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; font-size: 12px; font-family: ui-monospace, "SF Mono", Menlo, monospace; word-break: break-all; line-height: 1.6; color: var(--text-2); margin-bottom: 10px; }
  .link-a { display: block; text-align: center; text-decoration: none; }
  .install-section { background: linear-gradient(135deg, #2a2a2e, #1a1a1a); border-radius: 16px; padding: 18px 20px; margin-bottom: 12px; color: #fff; }
  .install-title { font-size: 14px; font-weight: 800; margin-bottom: 6px; }
  .install-desc { font-size: 12.5px; color: rgba(255,255,255,0.75); line-height: 1.7; margin-bottom: 12px; }
  .install-big-btn { width: 100%; background: #fff; color: #1a1a1a; border: none; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .install-steps { display: flex; flex-direction: column; gap: 8px; }
  .install-step { display: flex; gap: 10px; align-items: flex-start; }
  .install-step-num { width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,0.18); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .install-step-text { font-size: 12.5px; color: rgba(255,255,255,0.85); line-height: 1.6; }
  .install-step-text strong { color: #fff; }
  .app-foot { text-align: center; margin-top: 22px; color: var(--text-4); font-size: 11px; line-height: 1.9; }

  .empty { text-align: center; color: var(--text-3); font-size: 13px; padding: 30px 10px; line-height: 1.9; }
  .nudge { font-size: 12.5px; color: var(--text-2); background: #fffaf2; border: 1px solid #f0e2cf; border-radius: 10px; padding: 9px 12px; margin-bottom: 8px; line-height: 1.7; }

  .toast { position: fixed; left: 50%; bottom: calc(26px + var(--safe-bottom)); transform: translateX(-50%) translateY(20px); background: #1a1a1a; color: #fff; font-size: 13px; padding: 11px 20px; border-radius: 999px; opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s; z-index: 90; box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
"use strict";

// ── Constants ─────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'scale_v1';
const APP_VERSION = '1.0.0';
const VERSION_KEY = 'scale_version';
const TERMS_VERSION = 1;
const HASHTAGS = '#予備試験 #司法試験 #勉強記録';

const WHATS_NEW = [
  "Scale をリリースしました。学習時間の記録・科目バランス・過去問の進み具合を、ひとつの画面で。",
];

const DEV_INFO = {
  name: "田中志（たなかしるす）",
  message: "受験生がもくもく続けられる道具をつくっています。要望や不具合があれば教えてください。",
  links: [{ label: "X（Twitter）", url: "https://x.com/Sirusu_Tanaka" }],
};
const DONATIONS = [
  { key: "btc", label: "ビットコイン（BTC）", address: "1EHshWSHyvJFjkAYQ5rPX7nKo2FRKWF58f" },
  { key: "eth", label: "イーサリアム（ETH）", address: "0xb7da6af09c0f8db95d0c0e352e32d1915483931e" },
];

const PALETTE = ["#4f7cac","#7a6a9a","#c97b5a","#4a9a7a","#c0704a","#6a7a9a","#9a7a4a","#7a4a6a","#4a7a9a","#9a4a4a","#5a8a6a","#8a5a7a"];
const MODES = ['論文','短答','インプット','実務','その他'];

// 予備試験ベースの初期科目（あとから自由に編集できる）
const DEFAULT_SUBJECTS = [
  { name: '憲法',   target: 0 }, { name: '行政法', target: 0 },
  { name: '民法',   target: 0 }, { name: '商法',   target: 0 },
  { name: '民訴',   target: 0 }, { name: '刑法',   target: 0 },
  { name: '刑訴',   target: 0 }, { name: '実務基礎', target: 0 },
  { name: '選択科目', target: 0 },
];

// ── State ───────────────────────────────────────────────────────────────────
let state = {
  agreedTermsVersion: 0,
  subjects: [],                 // { id, name, color, target(分/週), pastDone, pastTotal }
  logs: [],                     // { id, date 'YYYY-MM-DD', subjectId, minutes, mode, memo, ts }
  timer: null,                  // { subjectId, startedAt(ISO) }
  settings: { weekStart: 'mon' },
};

let currentTab    = 'home';
let showTermsView = false;
let showHelpView  = false;
let updateInfo    = null;
let formView      = null;       // 'log' | 'subject' | 'share' | null
let editingLogId  = null;
let editingSubjectId = null;
let logDraft      = null;       // { subjectId, minutes, mode, memo, date }
let subjDraft     = null;       // { name, color, targetHours, pastDone, pastTotal }
let shareScope    = 'today';    // 'today' | 'week'
let timerInterval = null;

// ── Persistence ─────────────────────────────────────────────────────────────
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s && typeof s === 'object') {
      state = Object.assign({}, state, s);
      state.settings = Object.assign({ weekStart: 'mon' }, s.settings || {});
      if (!Array.isArray(state.subjects)) state.subjects = [];
      if (!Array.isArray(state.logs)) state.logs = [];
    }
  } catch {}
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch { showToast('保存できませんでした（容量がいっぱいかもしれません）'); }
}
function seedSubjectsIfEmpty() {
  if (state.subjects.length) return;
  state.subjects = DEFAULT_SUBJECTS.map(function(s, i) {
    return { id: randomId(), name: s.name, color: PALETTE[i % PALETTE.length], target: s.target || 0, pastDone: 0, pastTotal: 0 };
  });
}

// ── Utilities ─────────────────────────────────────────────────────────────
function randomId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function escHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), 2200);
}
function subjectById(id) { return state.subjects.find(s => s.id === id) || null; }

function pad(n) { return n < 10 ? '0' + n : '' + n; }
function dateStr(d) { return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()); }
function todayStr() { return dateStr(new Date()); }
function parseDate(s) { const p = String(s).split('-'); return new Date(+p[0], +p[1]-1, +p[2]); }

function startOfWeek() {
  const d = new Date(); d.setHours(0,0,0,0);
  const day = d.getDay(); // 0=Sun..6=Sat
  const ws = state.settings.weekStart === 'sun' ? 0 : 1;
  let diff = day - ws; if (diff < 0) diff += 7;
  d.setDate(d.getDate() - diff);
  return d;
}
function isThisWeek(ds) { const d = parseDate(ds); return d >= startOfWeek(); }

function minutesOn(ds, subjectId) {
  return state.logs.reduce((a, l) => a + ((l.date === ds && (!subjectId || l.subjectId === subjectId)) ? l.minutes : 0), 0);
}
function minutesWeek(subjectId) {
  return state.logs.reduce((a, l) => a + ((isThisWeek(l.date) && (!subjectId || l.subjectId === subjectId)) ? l.minutes : 0), 0);
}
function minutesTotal(subjectId) {
  return state.logs.reduce((a, l) => a + ((!subjectId || l.subjectId === subjectId) ? l.minutes : 0), 0);
}
function lastStudied(subjectId) {
  let best = null;
  for (const l of state.logs) { if (l.subjectId === subjectId) { if (!best || l.date > best) best = l.date; } }
  return best;
}
function daysSince(ds) { if (!ds) return null; const a = parseDate(ds); a.setHours(0,0,0,0); const b = new Date(); b.setHours(0,0,0,0); return Math.round((b - a) / 86400000); }
function streakDays() {
  const set = new Set(state.logs.map(l => l.date));
  let n = 0; const d = new Date(); d.setHours(0,0,0,0);
  // 今日まだなら昨日から数える
  if (!set.has(dateStr(d))) d.setDate(d.getDate() - 1);
  while (set.has(dateStr(d))) { n++; d.setDate(d.getDate() - 1); }
  return n;
}
function hm(min) {
  min = Math.max(0, Math.round(min));
  const h = Math.floor(min / 60), m = min % 60;
  if (h && m) return h + '時間' + m + '分';
  if (h) return h + '時間';
  return m + '分';
}
function hmShort(min) {
  min = Math.max(0, Math.round(min));
  const h = Math.floor(min / 60), m = min % 60;
  if (h && m) return h + 'h' + m + 'm';
  if (h) return h + 'h';
  return m + 'm';
}

function isInStandaloneMode() { return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true; }
function isIOS() { return /iphone|ipad|ipod/i.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1); }

// ── Version notice ─────────────────────────────────────────────────────────
function checkVersion() {
  let prev = null;
  try { prev = localStorage.getItem(VERSION_KEY); } catch {}
  if (prev && prev !== APP_VERSION) updateInfo = { from: prev, to: APP_VERSION };
  if (!updateInfo) { try { localStorage.setItem(VERSION_KEY, APP_VERSION); } catch {} }
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  stopTimerInterval();

  if ((state.agreedTermsVersion || 0) < TERMS_VERSION) { app.innerHTML = renderTerms(false); return; }
  if (showTermsView) { app.innerHTML = renderTerms(true); return; }
  if (showHelpView)  { app.innerHTML = renderHelp(); return; }
  if (updateInfo)    { app.innerHTML = renderUpdateScreen(); return; }
  if (formView === 'log')     { app.innerHTML = renderLogForm(); bindLogForm(); return; }
  if (formView === 'subject') { app.innerHTML = renderSubjectForm(); bindSubjectForm(); return; }
  if (formView === 'share')   { app.innerHTML = renderShareScreen(); return; }

  app.innerHTML = renderShell(renderTab());
  if (currentTab === 'home') startTimerInterval();
}

function renderShell(content) {
  const tabs = [['home','ホーム'],['history','きろく'],['subjects','科目'],['settings','設定']];
  return '<nav class="nav"><div class="nav-bar"><span class="nav-title">Scale</span></div>'
    + '<div class="nav-tabs">'
    + tabs.map(function(t) { return '<button class="nav-tab' + (currentTab === t[0] ? ' active' : '') + '" onclick="switchTab(\'' + t[0] + '\')">' + t[1] + '</button>'; }).join('')
    + '</div></nav>'
    + '<div class="main" id="tab-content">' + content + '</div>';
}
function renderTab() {
  if (currentTab === 'history')  return renderHistory();
  if (currentTab === 'subjects') return renderSubjects();
  if (currentTab === 'settings') return renderSettings();
  return renderHome();
}
function switchTab(tab) { currentTab = tab; render(); }
function refreshTab() {
  const c = document.getElementById('tab-content');
  if (c) c.innerHTML = renderTab();
}

// ── HOME ───────────────────────────────────────────────────────────────────────
function renderHome() {
  const today = minutesOn(todayStr());
  const week  = minutesWeek();
  const streak = streakDays();

  // 科目バランス
  const wkVals = state.subjects.map(function(s) { return minutesWeek(s.id); });
  const wkMax = Math.max.apply(null, wkVals.concat([1]));
  const bars = state.subjects.map(function(s, i) {
    const wk = wkVals[i];
    let pct, valHtml;
    if (s.target > 0) {
      pct = Math.min(100, wk / s.target * 100);
      const met = wk >= s.target;
      valHtml = '<span class="' + (met ? 'met' : '') + '">' + hmShort(wk) + (met ? ' ✓' : ' / ' + hmShort(s.target)) + '</span>';
    } else {
      pct = wk / wkMax * 100;
      valHtml = hmShort(wk);
    }
    return '<div class="bal-row">'
      + '<div class="bal-name">' + escHtml(s.name) + '</div>'
      + '<div class="bal-track"><div class="bal-fill" style="width:' + pct.toFixed(1) + '%;background:' + s.color + '"></div></div>'
      + '<div class="bal-val">' + valHtml + '</div></div>';
  }).join('');

  // しばらく空いている科目（過去に記録があり、4日以上）
  const neglected = state.subjects.map(function(s) { return { s: s, d: daysSince(lastStudied(s.id)) }; })
    .filter(function(x) { return x.d !== null && x.d >= 4; })
    .sort(function(a, b) { return b.d - a.d; }).slice(0, 3);
  let nudgeHtml = '';
  if (neglected.length) {
    nudgeHtml = '<div style="margin-bottom:12px">' + neglected.map(function(x) {
      return '<div class="nudge">⏳ <strong>' + escHtml(x.s.name) + '</strong> は ' + x.d + '日 空いています。そろそろ復習どうですか？</div>';
    }).join('') + '</div>';
  }

  return '<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px">'
    + '<div class="section-title">きょうの学習</div>'
    + '<div class="muted">' + (streak > 0 ? '🔥 ' + streak + '日連続' : '今日からまた一歩') + '</div></div>'
    + '<div class="summary">'
    + '<div class="sum-box"><div class="sum-label">今日</div><div class="sum-val">' + summaryNum(today) + '</div></div>'
    + '<div class="sum-box"><div class="sum-label">今週</div><div class="sum-val">' + summaryNum(week) + '</div></div>'
    + '<div class="sum-box"><div class="sum-label">合計</div><div class="sum-val">' + summaryNum(minutesTotal()) + '</div></div>'
    + '</div>'
    + renderTimerCard()
    + '<button class="btn-primary" style="margin-bottom:14px" onclick="openLogForm()">＋ 学習を記録する</button>'
    + nudgeHtml
    + '<div class="card"><div class="field-label" style="margin-bottom:12px">今週の科目バランス</div>'
    + (state.subjects.length ? bars : '<div class="muted">科目がありません。「科目」タブで追加できます。</div>')
    + '</div>'
    + '<button class="btn-secondary" style="width:100%" onclick="openShare()">📣 学習記録をXにシェア</button>'
    + '<div class="app-foot">Scale · 記録はこの端末の中だけに保存されます</div>';
}
function summaryNum(min) {
  if (min < 60) return min + '<small> 分</small>';
  const h = Math.floor(min / 60), m = min % 60;
  return h + '<small>時間</small>' + (m ? m + '<small>分</small>' : '');
}

function renderTimerCard() {
  if (state.timer) {
    const s = subjectById(state.timer.subjectId);
    return '<div class="timer-card" id="timer-card">'
      + '<div class="timer-top"><div><div class="timer-label">計測中</div>'
      + '<div class="timer-time" id="timer-time">' + fmtElapsed(elapsedSec()) + '</div>'
      + '<div class="timer-subj">' + escHtml(s ? s.name : '科目') + '</div></div></div>'
      + '<div class="timer-btns"><button class="tb-stop" onclick="stopTimer()">ストップして記録</button>'
      + '<button class="tb-cancel" onclick="cancelTimer()">取消</button></div></div>';
  }
  const opts = state.subjects.map(function(s) { return '<option value="' + s.id + '">' + escHtml(s.name) + '</option>'; }).join('');
  return '<div class="timer-card">'
    + '<div class="timer-label" style="margin-bottom:8px">ストップウォッチで計る</div>'
    + '<div class="timer-btns" style="margin-top:0">'
    + '<select id="timer-subj" style="flex:2;background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:10px">'
    + (state.subjects.length ? opts : '<option>科目がありません</option>') + '</select>'
    + '<button class="tb-start" style="flex:1" onclick="startTimer()"' + (state.subjects.length ? '' : ' disabled') + '>スタート</button>'
    + '</div></div>';
}
function elapsedSec() { return state.timer ? Math.max(0, Math.floor((Date.now() - new Date(state.timer.startedAt).getTime()) / 1000)) : 0; }
function fmtElapsed(sec) {
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
  return (h ? h + ':' + pad(m) : m) + ':' + pad(s);
}
function startTimerInterval() {
  stopTimerInterval();
  if (!state.timer) return;
  timerInterval = setInterval(function() {
    const el = document.getElementById('timer-time');
    if (el) el.textContent = fmtElapsed(elapsedSec());
  }, 1000);
}
function stopTimerInterval() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }

function startTimer() {
  const sel = document.getElementById('timer-subj');
  if (!sel || !sel.value) { showToast('科目を選んでください'); return; }
  state.timer = { subjectId: sel.value, startedAt: new Date().toISOString() };
  saveState();
  render();
}
function cancelTimer() {
  if (!confirm('計測を取り消しますか？')) return;
  state.timer = null; saveState(); render();
}
function stopTimer() {
  if (!state.timer) return;
  const mins = Math.max(1, Math.round(elapsedSec() / 60));
  const subjectId = state.timer.subjectId;
  state.timer = null; saveState();
  openLogForm(null, { subjectId: subjectId, minutes: mins });
}

// ── LOG FORM ─────────────────────────────────────────────────────────────────
function openLogForm(logId, preset) {
  editingLogId = logId || null;
  if (logId) {
    const l = state.logs.find(x => x.id === logId);
    logDraft = l ? { subjectId: l.subjectId, minutes: l.minutes, mode: l.mode, memo: l.memo || '', date: l.date }
                 : null;
  } else {
    const first = state.subjects[0];
    logDraft = { subjectId: (preset && preset.subjectId) || (first && first.id) || '', minutes: (preset && preset.minutes) || 30, mode: '論文', memo: '', date: todayStr() };
  }
  if (!logDraft) return;
  formView = 'log';
  render();
}
function closeForm() { formView = null; editingLogId = null; editingSubjectId = null; render(); }

function renderLogForm() {
  const subjChips = state.subjects.map(function(s) {
    return '<button class="chip' + (logDraft.subjectId === s.id ? ' active' : '') + '" onclick="logPick(\'subjectId\',\'' + s.id + '\')">'
      + '<span class="cdot" style="background:' + s.color + '"></span>' + escHtml(s.name) + '</button>';
  }).join('');
  const modeChips = MODES.map(function(m) {
    return '<button class="chip' + (logDraft.mode === m ? ' active' : '') + '" onclick="logPick(\'mode\',\'' + m + '\')">' + m + '</button>';
  }).join('');
  const presets = [15,30,45,60,90,120].map(function(v) { return '<button class="preset" onclick="logSetMin(' + v + ')">' + hmShort(v) + '</button>'; }).join('');

  return '<div class="form-root">'
    + '<div class="form-top"><div class="form-title">' + (editingLogId ? '記録を編集' : '学習を記録') + '</div>'
    + '<button class="x-close" onclick="closeForm()">✕ 閉じる</button></div>'
    + '<div class="form-block"><div class="field-label">科目</div><div class="chips">' + (subjChips || '<span class="muted">科目がありません</span>') + '</div></div>'
    + '<div class="form-block"><div class="field-label">時間</div>'
    + '<div class="stepper"><button class="step-btn" onclick="logAddMin(-5)">−</button>'
    + '<div class="step-val" id="log-min">' + logMinLabel() + '</div>'
    + '<button class="step-btn" onclick="logAddMin(5)">＋</button></div>'
    + '<div class="presets">' + presets + '</div></div>'
    + '<div class="form-block"><div class="field-label">種類</div><div class="chips">' + modeChips + '</div></div>'
    + '<div class="form-block"><div class="field-label">日付</div><input type="date" id="log-date" value="' + escHtml(logDraft.date) + '" onchange="logPick(\'date\', this.value)" style="width:auto" /></div>'
    + '<div class="form-block"><div class="field-label">メモ（任意）</div><textarea id="log-memo" maxlength="200" placeholder="やった範囲、気づき、答案の出来など" oninput="logDraft.memo=this.value">' + escHtml(logDraft.memo) + '</textarea></div>'
    + '<button class="btn-primary" onclick="saveLog()"' + (logDraft.subjectId ? '' : ' disabled') + '>' + (editingLogId ? '保存する' : '記録する') + '</button>'
    + (editingLogId ? '<button class="btn-danger" style="margin-top:10px" onclick="deleteLog()">この記録を削除</button>' : '')
    + '</div>';
}
function bindLogForm() {}
function logMinLabel() { return logDraft.minutes + '<small> 分</small>'; }
function logPick(k, v) {
  logDraft[k] = v;
  if (k === 'subjectId' || k === 'mode') refreshFormChips();
}
function refreshFormChips() {
  const memoEl = document.getElementById('log-memo');
  if (memoEl) logDraft.memo = memoEl.value; // 入力中のメモを保持
  document.getElementById('app').innerHTML = renderLogForm();
  bindLogForm();
}
function logAddMin(d) { logDraft.minutes = Math.max(5, Math.min(1440, logDraft.minutes + d)); const el = document.getElementById('log-min'); if (el) el.innerHTML = logMinLabel(); }
function logSetMin(v) { logDraft.minutes = v; const el = document.getElementById('log-min'); if (el) el.innerHTML = logMinLabel(); }
function saveLog() {
  if (!logDraft.subjectId) { showToast('科目を選んでください'); return; }
  const memoEl = document.getElementById('log-memo'); if (memoEl) logDraft.memo = memoEl.value;
  if (editingLogId) {
    const l = state.logs.find(x => x.id === editingLogId);
    if (l) { l.subjectId = logDraft.subjectId; l.minutes = logDraft.minutes; l.mode = logDraft.mode; l.memo = logDraft.memo.trim(); l.date = logDraft.date; }
  } else {
    state.logs.push({ id: randomId(), date: logDraft.date, subjectId: logDraft.subjectId, minutes: logDraft.minutes, mode: logDraft.mode, memo: logDraft.memo.trim(), ts: Date.now() });
  }
  saveState();
  formView = null; editingLogId = null;
  currentTab = 'home';
  render();
  showToast('記録しました（' + hm(logDraft.minutes) + '）');
}
function deleteLog() {
  if (!editingLogId || !confirm('この記録を削除しますか？')) return;
  state.logs = state.logs.filter(l => l.id !== editingLogId);
  saveState();
  formView = null; editingLogId = null; render();
  showToast('削除しました');
}

// ── HISTORY ────────────────────────────────────────────────────────────────────
function renderHistory() {
  if (!state.logs.length) {
    return '<div class="section-title" style="margin-bottom:6px">きろく</div><div class="empty">まだ記録がありません。<br>ホームの「＋ 学習を記録する」から始めましょう。</div>';
  }
  const byDate = {};
  state.logs.forEach(function(l) { (byDate[l.date] = byDate[l.date] || []).push(l); });
  const dates = Object.keys(byDate).sort().reverse();
  const blocks = dates.map(function(ds) {
    const items = byDate[ds].slice().sort(function(a, b) { return (b.ts || 0) - (a.ts || 0); });
    const dayTotal = items.reduce(function(a, l) { return a + l.minutes; }, 0);
    const rows = items.map(function(l) {
      const s = subjectById(l.subjectId);
      const color = s ? s.color : '#bbb';
      return '<div class="log-item" onclick="openLogForm(\'' + l.id + '\')">'
        + '<div class="log-bar" style="background:' + color + '"></div>'
        + '<div class="log-body"><div class="log-subj">' + escHtml(s ? s.name : '（削除された科目）') + '</div>'
        + '<div class="log-meta">' + escHtml(l.mode || '') + '</div>'
        + (l.memo ? '<div class="log-memo">' + escHtml(l.memo) + '</div>' : '')
        + '</div><div class="log-min">' + hmShort(l.minutes) + '</div></div>';
    }).join('');
    return '<div class="day-head"><span>' + fmtDayLabel(ds) + '</span><span>計 ' + hm(dayTotal) + '</span></div>' + rows;
  }).join('');

  return '<div style="display:flex;align-items:baseline;justify-content:space-between">'
    + '<div class="section-title">きろく</div>'
    + '<div class="muted">今週 ' + hm(minutesWeek()) + '</div></div>' + blocks;
}
function fmtDayLabel(ds) {
  const d = parseDate(ds); const w = ['日','月','火','水','木','金','土'][d.getDay()];
  const t = todayStr();
  let prefix = '';
  if (ds === t) prefix = '今日・';
  else { const yd = new Date(); yd.setDate(yd.getDate()-1); if (ds === dateStr(yd)) prefix = '昨日・'; }
  return prefix + (d.getMonth()+1) + '月' + d.getDate() + '日（' + w + '）';
}

// ── SUBJECTS ───────────────────────────────────────────────────────────────────
function renderSubjects() {
  const cards = state.subjects.map(function(s, i) {
    const total = minutesTotal(s.id);
    const last = lastStudied(s.id);
    const ds = daysSince(last);
    const lastTxt = last ? (ds === 0 ? '今日' : ds + '日前') : 'まだ';
    const past = (s.pastTotal > 0)
      ? '<div class="past-track"><div class="past-fill" style="width:' + Math.min(100, s.pastDone / s.pastTotal * 100).toFixed(0) + '%"></div></div>'
      : '';
    const pastTxt = (s.pastTotal > 0) ? '過去問 ' + s.pastDone + '/' + s.pastTotal : '';
    return '<div class="subj-card">'
      + '<div class="subj-color" style="background:' + s.color + '"></div>'
      + '<div class="subj-body"><div class="subj-name">' + escHtml(s.name) + '</div>'
      + '<div class="subj-stat">合計 ' + hm(total) + ' ・ 最終 ' + lastTxt + (s.target > 0 ? ' ・ 目標 ' + hmShort(s.target) + '/週' : '') + (pastTxt ? ' ・ ' + pastTxt : '') + '</div>'
      + past
      + '</div>'
      + '<div class="subj-actions">'
      + (s.pastTotal > 0 ? '<button class="mini-btn" onclick="pastInc(\'' + s.id + '\')">過去問＋1</button>' : '')
      + '<button class="mini-btn" onclick="openSubjectForm(\'' + s.id + '\')">編集</button>'
      + '</div></div>';
  }).join('');

  return '<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px">'
    + '<div class="section-title">科目</div>'
    + '<button class="btn-ghost" onclick="openSubjectForm()">＋ 追加</button></div>'
    + (cards || '<div class="empty">科目がありません。「＋ 追加」から作成できます。</div>')
    + '<div class="app-foot">並び順は編集画面の「上へ／下へ」で変えられます</div>';
}
function pastInc(id) {
  const s = subjectById(id); if (!s) return;
  if (s.pastDone < s.pastTotal) { s.pastDone++; saveState(); refreshTab(); }
  if (s.pastDone >= s.pastTotal && s.pastTotal > 0) showToast(s.name + ' の過去問、ひと通り完了！🎉');
}

function openSubjectForm(id) {
  editingSubjectId = id || null;
  if (id) {
    const s = subjectById(id);
    subjDraft = s ? { name: s.name, color: s.color, targetHours: (s.target/60) || 0, pastDone: s.pastDone||0, pastTotal: s.pastTotal||0 } : null;
  } else {
    subjDraft = { name: '', color: PALETTE[state.subjects.length % PALETTE.length], targetHours: 0, pastDone: 0, pastTotal: 0 };
  }
  if (!subjDraft) return;
  formView = 'subject'; render();
}
function renderSubjectForm() {
  const colors = PALETTE.map(function(c) { return '<div class="color-dot' + (subjDraft.color === c ? ' selected' : '') + '" data-c="' + c + '" style="background:' + c + '" onclick="subjPickColor(\'' + c + '\')"></div>'; }).join('');
  const idx = editingSubjectId ? state.subjects.findIndex(s => s.id === editingSubjectId) : -1;
  return '<div class="form-root">'
    + '<div class="form-top"><div class="form-title">' + (editingSubjectId ? '科目を編集' : '科目を追加') + '</div>'
    + '<button class="x-close" onclick="closeForm()">✕ 閉じる</button></div>'
    + '<div class="form-block"><div class="field-label">科目名</div>'
    + '<input type="text" id="subj-name" maxlength="20" value="' + escHtml(subjDraft.name) + '" placeholder="例：民法、選択（労働法）…" oninput="subjDraft.name=this.value" /></div>'
    + '<div class="form-block"><div class="field-label">カラー</div><div class="color-row">' + colors + '</div></div>'
    + '<div class="form-block"><div class="field-label">週の目標時間（任意・0でなし）</div>'
    + '<input type="number" id="subj-target" min="0" max="60" step="0.5" value="' + subjDraft.targetHours + '" oninput="subjDraft.targetHours=parseFloat(this.value)||0" style="width:120px" /> <span class="muted">時間 / 週</span></div>'
    + '<div class="form-block"><div class="field-label">過去問の総数（任意・0でなし）</div>'
    + '<input type="number" id="subj-ptotal" min="0" max="9999" step="1" value="' + (subjDraft.pastTotal||0) + '" oninput="subjDraft.pastTotal=parseInt(this.value)||0" style="width:120px" /> <span class="muted">問・年度など</span>'
    + (subjDraft.pastTotal>0 ? '<div style="margin-top:10px"><div class="field-label">これまでに解いた数</div><input type="number" id="subj-pdone" min="0" step="1" value="' + (subjDraft.pastDone||0) + '" oninput="subjDraft.pastDone=parseInt(this.value)||0" style="width:120px" /></div>' : '')
    + '</div>'
    + (idx >= 0 ? '<div class="form-block"><div class="field-label">並び順</div><div class="row">'
        + '<button class="btn-secondary" onclick="moveSubject(-1)"' + (idx === 0 ? ' disabled' : '') + '>↑ 上へ</button>'
        + '<button class="btn-secondary" onclick="moveSubject(1)"' + (idx === state.subjects.length-1 ? ' disabled' : '') + '>↓ 下へ</button>'
        + '</div></div>' : '')
    + '<button class="btn-primary" onclick="saveSubject()"' + (subjDraft.name.trim() ? '' : ' disabled') + '>' + (editingSubjectId ? '保存する' : '追加する') + '</button>'
    + (editingSubjectId ? '<button class="btn-danger" style="margin-top:10px" onclick="deleteSubject()">この科目を削除</button>' : '')
    + '</div>';
}
function bindSubjectForm() {}
function subjPickColor(c) { subjDraft.color = c; document.querySelectorAll('.color-dot').forEach(function(d) { d.classList.toggle('selected', d.getAttribute('data-c') === c); }); }
function moveSubject(dir) {
  const i = state.subjects.findIndex(s => s.id === editingSubjectId);
  const j = i + dir;
  if (i < 0 || j < 0 || j >= state.subjects.length) return;
  const arr = state.subjects; const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  saveState(); render();
}
function saveSubject() {
  const name = (subjDraft.name || '').trim();
  if (!name) { showToast('科目名を入力してください'); return; }
  const target = Math.round((subjDraft.targetHours || 0) * 60);
  const pastTotal = Math.max(0, subjDraft.pastTotal || 0);
  const pastDone = Math.max(0, Math.min(pastTotal || 999999, subjDraft.pastDone || 0));
  if (editingSubjectId) {
    const s = subjectById(editingSubjectId);
    if (s) { s.name = name; s.color = subjDraft.color; s.target = target; s.pastTotal = pastTotal; s.pastDone = pastDone; }
  } else {
    state.subjects.push({ id: randomId(), name: name, color: subjDraft.color, target: target, pastDone: pastDone, pastTotal: pastTotal });
  }
  saveState();
  formView = null; editingSubjectId = null; currentTab = 'subjects'; render();
  showToast('保存しました');
}
function deleteSubject() {
  if (!editingSubjectId) return;
  const used = state.logs.some(l => l.subjectId === editingSubjectId);
  const msg = used ? 'この科目を削除しますか？\n過去の記録は残りますが「削除された科目」と表示されます。' : 'この科目を削除しますか？';
  if (!confirm(msg)) return;
  state.subjects = state.subjects.filter(s => s.id !== editingSubjectId);
  if (state.timer && state.timer.subjectId === editingSubjectId) state.timer = null;
  saveState();
  formView = null; editingSubjectId = null; currentTab = 'subjects'; render();
  showToast('削除しました');
}

// ── SHARE (X) ──────────────────────────────────────────────────────────────────
function openShare() { shareScope = 'today'; formView = 'share'; render(); }
function setShareScope(sc) { shareScope = sc; render(); }
function buildShareText() {
  const isToday = shareScope === 'today';
  const total = isToday ? minutesOn(todayStr()) : minutesWeek();
  const head = isToday ? '📚 今日の学習' : '📚 今週の学習';
  const lines = [];
  const breakdown = state.subjects.map(function(s) { return { name: s.name, min: isToday ? minutesOn(todayStr(), s.id) : minutesWeek(s.id) }; })
    .filter(function(x) { return x.min > 0; })
    .sort(function(a, b) { return b.min - a.min; });

  lines.push(head + '　' + hm(total));
  if (breakdown.length) {
    lines.push(breakdown.map(function(x) { return x.name + ' ' + hmShort(x.min); }).join(' / '));
  } else {
    lines.push('（まだ記録がありません）');
  }
  const st = streakDays();
  if (st > 1) lines.push('🔥 ' + st + '日連続');
  lines.push(HASHTAGS);
  return lines.join('\n');
}
function renderShareScreen() {
  const text = buildShareText();
  return '<div class="form-root">'
    + '<div class="form-top"><div class="form-title">Xにシェア</div><button class="x-close" onclick="closeForm()">✕ 閉じる</button></div>'
    + '<div class="seg"><button class="' + (shareScope==='today'?'active':'') + '" onclick="setShareScope(\'today\')">今日</button>'
    + '<button class="' + (shareScope==='week'?'active':'') + '" onclick="setShareScope(\'week\')">今週</button></div>'
    + '<div class="field-label">この内容で投稿します</div>'
    + '<div class="share-pre" id="share-pre">' + escHtml(text) + '</div>'
    + '<button class="btn-primary" style="margin-top:14px" onclick="postToX()">Xでポストする</button>'
    + '<button class="btn-secondary" style="width:100%;margin-top:10px" onclick="copyShare()">テキストをコピー</button>'
    + '<div class="app-foot">投稿前に内容は自由に編集できます。アプリから自動投稿はしません。</div>'
    + '</div>';
}
function postToX() {
  const text = buildShareText();
  if (navigator.share) {
    navigator.share({ text: text }).catch(function() { openXIntent(text); });
  } else { openXIntent(text); }
}
function openXIntent(text) {
  const url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text);
  window.open(url, '_blank', 'noopener');
}
function copyShare() {
  const text = buildShareText();
  const done = function() { showToast('コピーしました'); };
  if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(done).catch(function() { fallbackCopy(text, done); });
  else fallbackCopy(text, done);
}

function setWeekStart(v) { state.settings.weekStart = v; saveState(); refreshTab(); }
function copyAddress(text) {
  const done = function() { showToast('アドレスをコピーしました'); };
  if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(done).catch(function() { fallbackCopy(text, done); });
  else fallbackCopy(text, done);
}
function fallbackCopy(text, done) {
  try { const ta = document.createElement('textarea'); ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done(); }
  catch { showToast('コピーできませんでした'); }
}
function resetApp() {
  if (!confirm('すべての記録と科目を削除します。元に戻せません。よろしいですか？')) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch {}
  state = { agreedTermsVersion: TERMS_VERSION, subjects: [], logs: [], timer: null, settings: { weekStart: 'mon' } };
  seedSubjectsIfEmpty(); saveState();
  currentTab = 'home'; formView = null; render();
  showToast('リセットしました');
}

// ── PWA ────────────────────────────────────────────────────────────────────────
let deferredPrompt = null;
async function triggerInstall() {
  if (deferredPrompt) { deferredPrompt.prompt(); try { await deferredPrompt.userChoice; } catch {} deferredPrompt = null; if (currentTab === 'settings') refreshTab(); return; }
  showToast(isIOS() ? 'Safariの共有ボタンから「ホーム画面に追加」を選んでください' : 'ブラウザのメニューから「ホーム画面に追加」を選んでください');
}
async function forceUpdate() {
  try {
    if ('serviceWorker' in navigator) { const regs = await navigator.serviceWorker.getRegistrations(); await Promise.all(regs.map(function(r) { return r.unregister(); })); }
    if (window.caches && caches.keys) { const keys = await caches.keys(); await Promise.all(keys.map(function(k) { return caches.delete(k); })); }
  } catch {}
  window.location.reload();
}
window.addEventListener('beforeinstallprompt', function(e) { e.preventDefault(); deferredPrompt = e; if (currentTab === 'settings') refreshTab(); });

// ── Boot ─────────────────────────────────────────────────────────────────────
loadState();
if ((state.agreedTermsVersion || 0) >= TERMS_VERSION) seedSubjectsIfEmpty();
checkVersion();
render();

// ── Service Worker ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  var hadController = !!navigator.serviceWorker.controller;
  var reloading = false;
  navigator.serviceWorker.addEventListener('controllerchange', function() { if (!hadController || reloading) return; reloading = true; window.location.reload(); });
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').then(function(reg) {
      reg.update().catch(function() {});
      reg.addEventListener('updatefound', function() {
        var nw = reg.installing; if (!nw) return;
        nw.addEventListener('statechange', function() { if (nw.state === 'installed' && navigator.serviceWorker.controller) nw.postMessage({ type: 'SKIP_WAITING' }); });
      });
    }).catch(function() {});
  });
}
